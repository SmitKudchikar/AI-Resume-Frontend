<div class="container">

  <h1>AI Resume Analyzer</h1>

      <input
        type="file"
        accept=".pdf"
        (change)="onFileSelected($event)">

      <button (click)="uploadResume()">
        Upload & Analyze PDF
      </button>

</div>

<div *ngIf="score > 0">

    <h2>Resume Score: {{ score }}/100</h2>

    <h3>Status: {{ status }}</h3>

    <p>DEBUG RESPONSE SCORE = {{ score }}</p>
<p>DEBUG RESPONSE STATUS = {{ status }}</p>

<button (click)="proceedToAssessment()">
  Proceed to Assessment
</button>



</div>

<div class="score-card">
  <h2>Resume Score</h2>
  <span>{{ score }}/100</span>

  <h1>DEBUG SCORE = {{ score }}</h1>
</div>
