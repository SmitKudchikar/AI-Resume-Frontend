<div class="assessment-container">

  <h2>Technical Assessment</h2>

  <div *ngFor="let q of questions" class="question-card">

    <h4>{{ q.id }}. {{ q.question }}</h4>

    <div *ngFor="let option of q.options">

      <label>
        <input
          type="radio"
          [name]="'question' + q.id"
          [value]="option"
          [checked]="answers[q.id] === option"
          (change)="answers[q.id] = option">

        {{ option }}
      </label>

    </div>

  </div>

  <button (click)="submitAssessment()">
    Submit Assessment
  </button>

</div>
